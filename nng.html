<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neue Nationalgalerie — Gaussian Splat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #info {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      pointer-events: none;
    }
    #fps {
      position: fixed;
      top: 10px;
      left: 10px;
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      font-family: monospace;
    }
    #camid {
      position: fixed;
      top: 10px;
      right: 10px;
      color: rgba(255,255,255,0.2);
      font-size: 10px;
      font-family: monospace;
    }
    #back {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Helvetica Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 3px;
      transition: color 0.2s, border-color 0.2s;
    }
    #back:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="fps"></div>
  <div id="camid"></div>
  <div id="info">Neue Nationalgalerie · Berlin · LOD2 Geodaten Berlin · drag to orbit</div>
  <a href="index.html" id="back">← banner</a>
  <div id="spinner" style="display:none"></div>
  <div id="progress" style="display:none;width:0"></div>
  <script src="splat.js"></script>
</body>
</html>
